<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Duster - Digital Clutter Cleaner</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
linear-gradient(rgba(10,15,30,0.75), rgba(10,15,30,0.75)),
url("images/particle-bg.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

text-align:center;
}

/* MAIN */

.main{
width:95%;
max-width:1600px;
display:flex;
justify-content:space-between;
align-items:center;
gap:30px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
text-align:center;
width:420px;
backdrop-filter:blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card h1{
font-size:38px;
margin-bottom:12px;
}

.card p{
opacity:0.7;
margin-bottom:40px;
}

/* FAKE INPUT */

.fake-input{

width:100%;
padding:16px;
border-radius:16px;
background:#0f172a;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:.3s;

}

.fake-input:hover{

border:1px solid #38bdf8;
box-shadow:0 0 20px rgba(56,189,248,0.6);

}

#fileInput{
display:none;
}

/* BUTTON */

button{

width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:600;
cursor:pointer;

background:linear-gradient(45deg,#6a11cb,#2575fc);

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.08);

box-shadow:0 0 35px rgba(101,0,255,0.9);

}

/* RIGHT */

.steps{
flex:1.3;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:40px;
}

.step-card{

height:280px;
border-radius:30px;
overflow:hidden;
background:#1e293b;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}

}

.step-card img{

width:100%;
height:100%;
object-fit:cover;
transition:.4s;

}

.step-card:hover img{

transform:scale(1.1);

}

</style>

</head>

<body>

<div class="main">

<div class="card">

<h1>🧹Duster</h1>

<p>Digital Clutter Cleaner</p>

<form action="ScanServlet" method="post" enctype="multipart/form-data">

<input
type="file"
id="fileInput"
name="screenshots"
multiple
accept="image/*"
style="display:none">

<div
class="fake-input"
onclick="document.getElementById('fileInput').click()"
id="folderText">

Select Screenshot Folder 

</div>

<button type="submit">

Scan Folder

</button>

</form>

</div>

<div class="steps">

<div class="step-card">
<a href="index.html">
<img src="images/step1.png">
</a>
</div>

<div class="step-card">
<a href="userDashboard.jsp">
<img src="images/step2.png">
</a>
</div>

<div class="step-card">
<a href="result.jsp">
<img src="images/step3.png">
</a>
</div>

<div class="step-card">
<a href="cleanResult.jsp">
<img src="images/step4.png">
</a>
</div>

</div>

</div>

<script>

document
.getElementById("fileInput")
.addEventListener("change",function(e){

let count=e.target.files.length;

if(count>0){

document
.getElementById("folderText")
.innerHTML=
"📂 "+count+" screenshots selected";

}

});

</script>

</body>

</html>
