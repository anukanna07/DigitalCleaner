<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duster Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(10,15,30,0.75), rgba(10,15,30,0.75)),
url("images/bg.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
animation:fadeIn 1.2s ease-in;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.main{
display:flex;
min-height:75vh;
}

.left{
flex:3;
padding:60px 80px;
}

.header{
text-align:center;
margin-bottom:50px;
}

.header h1{
font-size:42px;
}

.glass{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 8px 30px rgba(0,0,0,0.35);
border-radius:20px;
transition:0.4s;
}

.glass:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.15);
}

/* upload */

.upload-box{

width:420px;
padding:35px;
margin:auto;
text-align:center;

}

.upload-box h3{
margin-bottom:15px;
}

.upload-box p{
opacity:.8;
margin-bottom:20px;
}

.upload-icon{

font-size:45px;
margin-bottom:15px;

}

.file-list{

margin-top:15px;
font-size:14px;
opacity:.85;

}

/* buttons */

.btn{

padding:13px 32px;
border-radius:30px;
text-decoration:none;
font-weight:600;
margin:8px;
display:inline-block;
transition:.3s;
cursor:pointer;
border:none;

}

.primary{

background:linear-gradient(45deg,#6a11cb,#2575fc);
color:white;
box-shadow:0 0 20px rgba(101,0,255,0.5);

}

.primary:hover{

transform:scale(1.05);
box-shadow:0 0 35px rgba(101,0,255,0.9);

}

.secondary{

border:1px solid white;
color:white;
background:transparent;

}

.secondary:hover{

background:white;
color:#244c55;

}

</style>

</head>

<body>

<div class="main">

<div class="left">

<div class="header">

<h1>🧹 Duster</h1>

<p>Clean your screenshot clutter automatically</p>

</div>


<div class="upload-box glass">

<div class="upload-icon">
📂
</div>

<h3>Upload Screenshots</h3>

<p>Select images to scan duplicates & similar files</p>


<input

type="file"
id="fileInput"
multiple
accept="image/*"
style="display:none"

>


<label for="fileInput" class="btn primary">

Upload Files

</label>


<button class="btn primary" onclick="scanFiles()">

Scan Images

</button>


<a href="login.html" class="btn secondary">

Logout

</a>


<div class="file-list" id="fileList">

No files selected

</div>


</div>

</div>

</div>

<script>

let uploadedFiles=[];

document
.getElementById("fileInput")

.addEventListener("change",function(e){

uploadedFiles=e.target.files;

let text="";

for(let i=0;i<uploadedFiles.length;i++){

text+=uploadedFiles[i].name+"<br>";

}

document
.getElementById("fileList")
.innerHTML=text;

});


function scanFiles(){

if(uploadedFiles.length===0){

alert("Upload files first");

return;

}

alert(uploadedFiles.length+" images ready for scanning");

}

</script>

</body>

</html>
